name: Chromatic

on:
    workflow_dispatch:
    pull_request:
    push:
        branches: [main]

jobs:
    chromatic:
        name: Run Chromatic
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Detect Chromatic prerequisites
              id: detect
              env:
                  CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
              run: |
                  HAS_STORYBOOK=false
                  if [ -d ".storybook" ]; then
                    HAS_STORYBOOK=true
                  elif node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['build-storybook'] ? 0 : 1)"; then
                    HAS_STORYBOOK=true
                  fi

                  HAS_TOKEN=false
                  if [ -n "${CHROMATIC_PROJECT_TOKEN}" ]; then
                    HAS_TOKEN=true
                  fi

                  echo "has_storybook=${HAS_STORYBOOK}" >> "${GITHUB_OUTPUT}"
                  echo "has_token=${HAS_TOKEN}" >> "${GITHUB_OUTPUT}"

            - name: Skip when Storybook or token is missing
              if: ${{ steps.detect.outputs.has_storybook != 'true' || steps.detect.outputs.has_token != 'true' }}
              run: echo "Skipping Chromatic (missing Storybook setup or CHROMATIC_PROJECT_TOKEN secret)."

            - name: Set up Node.js
              if: ${{ steps.detect.outputs.has_storybook == 'true' && steps.detect.outputs.has_token == 'true' }}
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              if: ${{ steps.detect.outputs.has_storybook == 'true' && steps.detect.outputs.has_token == 'true' }}
              run: npm ci

            - name: Run Chromatic
              if: ${{ steps.detect.outputs.has_storybook == 'true' && steps.detect.outputs.has_token == 'true' }}
              uses: chromaui/action@latest
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                  onlyChanged: true
