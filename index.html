<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pozu</title>
      <script type="module" crossorigin src="./assets/index-C2RjW8Od.js"></script>
      <link rel="modulepreload" crossorigin href="./assets/payload-Dc2nii2Y.js">
      <link rel="stylesheet" crossorigin href="./assets/payload-DayvIZCL.css">
    </head>
    <body>
        <header class="top-nav">
            <div class="top-nav-inner">
                <a class="top-nav-brand" href="./index.html" aria-label="Pozu home">
                    <img class="top-nav-logo" src="./pozu-logo.svg" alt="" aria-hidden="true" />
                    <span>Pozu</span>
                </a>
                <nav class="top-nav-links" aria-label="View modes">
                    <button class="top-nav-link" data-view-mode="binary" type="button">
                        Binary
                    </button>
                    <button class="top-nav-link" data-view-mode="track" type="button">Track</button>
                    <a class="top-nav-link" href="./box.html">Box</a>
                    <button class="top-nav-link active" data-view-mode="label" type="button">
                        Label
                    </button>
                </nav>
            </div>
        </header>

        <main class="view-shell">
            <section id="labelView">
                <p class="instructions">
                    Click a label on the right to select it, then click the frame to place a point.
                </p>
                <div class="controls">
                    <button id="resetBtn" disabled>🔄 Reset Labels</button>
                </div>

                <div class="main-container">
                    <div>
                        <div class="canvas-container" id="canvasContainer" style="display: none">
                            <canvas id="frameCanvas"></canvas>
                        </div>
                        <div class="loading-fullscreen" id="initialLoading">
                            <div class="spinner"></div>
                            Loading frame...
                        </div>
                        <div class="bottom-actions">
                            <span class="frame-info" id="frameInfo">Loading…</span>
                            <button id="newFrameBtn" disabled>🚫 No Subject Present</button>
                            <button id="downloadBtn" disabled>📤 Submit</button>
                        </div>
                    </div>

                    <div class="sidebar">
                        <h2>🏷️ Skeleton</h2>
                        <div class="label-palette" id="labelPalette"></div>

                        <div id="statusMsg"></div>
                    </div>
                </div>
            </section>

            <section id="comingSoonView" class="coming-soon" hidden>
                <h1><span id="comingSoonModeName">Mode</span> View</h1>
                <p>Coming soon…</p>
                <div id="binaryDemo" class="binary-demo" hidden>
                    <figure>
                        <img src="./binary-demo-good.png" alt="Example of a good pose estimation, accepted as Good" />
                        <figcaption>Good</figcaption>
                    </figure>
                    <figure>
                        <img src="./binary-demo-bad.png" alt="Example of a bad pose estimation, rejected as Bad" />
                        <figcaption>Bad</figcaption>
                    </figure>
                </div>
            </section>
            <p class="subtitle page-credit">
                Powered by
                <a href="https://github.com/talmolab/sleap-io.js" target="_blank" rel="noopener"
                    >@talmolab/sleap-io.js</a
                >
                v2
            </p>
        </main>

    </body>
</html>
